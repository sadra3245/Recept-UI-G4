<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="/style/javaoc.js"></script>
    <link rel="stylesheet" href="/style/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>

</head>

<body>
    <div class="container">

        <header>
            <h1>ReceptBas</h1>
            <p class="h1-text">Sök, anpassa och planera menyer för hela sällskapet.</p>
        </header>

        <div class="main-input">


            <input type="search" class="search-bar" name="search-result" im
                placeholder="Sök efter recept, teman och blanda ingredienser...">

            <button class="but">sök</button>
        </div>

        <div class="drops">

            <div class="meal">

                <label>Måltidstyp
                </label>

                <select class="dish">
                    <option selected>Huvudrätt</option>
                    <option>Förätt</option>
                    <option>Efterätt</option>
                    <option>Tilltugg</option>
                </select>
            </div>


            <div class="meal">

                <label class="totalperson">Antal personer
                </label>

                <select class="total">
                    <option selected>0-10</option>
                    <option>10-20</option>
                    <option>20-50</option>
                    <option>50-100</option>
                </select>

            </div>

            <div class="meal">

                <label>Kostpreferens
                </label>

                <select class="restriction">
                    <option selected>Peskitarian</option>
                    <option>Vegan</option>
                    <option>Kosher</option>
                    <option>Halal</option>
                    <option>Vegetarian</option>
                </select>
            </div>


            <div class="meal">

                <label>Allergen
                </label>

                <select class="allergen">
                    <option selected>Gluten</option>
                    <option>Laktos</option>
                    <option>Mjölkprotein</option>
                    <option>Nötter</option>
                    <option>Skaldjur</option>
                </select>

            </div>
        </div>

        <div class="customize">
            <div class="priceintervall">
                <label>Prisintervall</label>
                <div class="eyes-section">
                    
                    <img src="/assets/eyes.png"><p>kr</p>
                </div>
            </div>

            <div class="price-description">
                <label>Per Person</label>
                <label class="company">Hela Sällskapet</label>
            </div>

            <div id="slider">


            </div>

            <div class="adaptablemeals">

            </div>
        </div>

    </div>
</body>

</html>
