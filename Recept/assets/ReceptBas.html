<body>
    <div class="container">

        <header>
            <h1>ReceptBas</h1>
            <p class="h1-text">Sök, anpassa och planera menyer för hela sällskapet.</p>
        </header>

        <div class="main-input">
            <input type="search" class="search-bar" name="search-result" im="" placeholder="Sök efter recept, teman och blanda ingredienser...">

            <button class="but">sök</button>
        </div>

        <div class="drops">

            <div class="meal">

                <label>
                    <h2>Måltidstyp</h2>

                    <select class="dish">
                        <option selected="">Huvudrätt</option>
                        <option>Förätt</option>
                        <option>Efterätt</option>
                        <option>Tilltugg</option>
                    </select>
                </label>
            </div>


            <div class="meal">

                <label class="totalperson">
                    <h2>Antal personer</h2>

                    <input type="text" placeholder="Antal personer..." class="total">

                </label>
            </div>

            <div class="meal">

                <label>
                    <h2>Kostpreferens</h2>

                    <select class="restriction">
                        <option selected="">Peskitarian</option>
                        <option>Vegan</option>
                        <option>Kosher</option>
                        <option>Halal</option>
                        <option>Vegetarian</option>
                    </select>
                </label>
            </div>


            <div class="meal">

                <label>
                    <h2>Allergen</h2>

                    <select class="allergen">
                        <option selected="">Gluten</option>
                        <option>Laktos</option>
                        <option>Mjölkprotein</option>
                        <option>Nötter</option>
                        <option>Skaldjur</option>
                    </select>
                </label>

            </div>
        </div>

        <div class="customize">
            <div class="priceintervall">
                <h2>Prisintervall</h2>
                <div class="eyes-section">

                    <img src="./ReceptBas_files/eyes.png" alt="eyes">
                    <p>kr</p>
                </div>
            </div>

            <div class="price-description">
                <h3>Per Person</h3>
                <h3 class="company">Hela Sällskapet</h3>
            </div>

            <div id="slider">
            </div>

            <div class="adaptablemeals">
            </div>
        </div>
    </div>
